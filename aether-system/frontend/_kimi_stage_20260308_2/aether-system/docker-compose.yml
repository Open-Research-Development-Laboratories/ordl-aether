version: '3.8'

services:
  aether:
    build: .
    container_name: aether-system
    ports:
      - "80:80"
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./ai_models:/app/ai_models
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Add Redis for caching
  redis:
    image: redis:7-alpine
    container_name: aether-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data: